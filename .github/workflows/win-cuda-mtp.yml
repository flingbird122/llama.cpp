name: Windows-RTX5060Ti-MTP-Optimized

on:
  workflow_dispatch:

env:
  # 解决 Node.js 弃用警告，强制使用最新环境
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 使用 GitHub 目前支持的最稳定版本 (12.4)
      # 放心，12.4 编译出的二进制文件在 13.1 驱动下可以完美运行
      - name: Setup CUDA Toolkit
        uses: jimver/cuda-toolkit@v0.2.14
        with:
          cuda: '12.4.1' 

      - name: Configure and Build
        shell: pwsh
        run: |
          mkdir build
          cd build
          # 这里我们微调算力号：
          # 如果 120 报错，编译器会提示。我们改用 90a 或 all-major 确保 50 系列兼容
          cmake .. -G "Visual Studio 17 2022" -A x64 `
            -DGGML_CUDA=ON `
            -DCMAKE_CUDA_ARCHITECTURES="90;100" `
            -DGGML_AVX2=ON `
            -DGGML_FLASH_ATTN=ON
          
          cmake --build . --config Release -j 4 --target llama-server

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: llama-server-RTX5060Ti-MTP
          path: build/bin/Release/llama-server.exe
