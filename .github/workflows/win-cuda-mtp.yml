name: Windows-RTX5060Ti-MTP-DirectBuild

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. 放弃插件，直接通过命令行下载并安装 CUDA 极简运行环境
      - name: Install CUDA Manually
        shell: powershell
        run: |
          $cuda_version = "12.2.0_536.25"
          $url = "https://developer.download.nvidia.com/compute/cuda/12.2.0/local_installers/cuda_12.2.0_536.25_windows.exe"
          Invoke-WebRequest -Uri $url -OutFile "cuda_install.exe"
          Start-Process -FilePath ".\cuda_install.exe" -ArgumentList "-s", "nvcc_12.2", "cublas_12.2", "cublas_dev_12.2", "cudart_12.2" -Wait

      # 2. 编译配置
      - name: Configure and Build
        shell: pwsh
        run: |
          # 动态寻找刚才安装的 nvcc 路径
          $env:Path = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v12.2\bin;" + $env:Path
          mkdir build
          cd build
          cmake .. -G "Visual Studio 17 2022" -A x64 `
            -DGGML_CUDA=ON `
            -DCMAKE_CUDA_ARCHITECTURES="all-major" `
            -DGGML_AVX2=ON `
            -DGGML_FLASH_ATTN=ON
          cmake --build . --config Release -j 4 --target llama-server

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: llama-server-Win-MTP
          path: build/bin/Release/llama-server.exe
